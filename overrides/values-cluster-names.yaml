---
# Minimal override for DR cluster names, versions, and regions.
# This file is applied after chart defaults (override merged last). It only contains overlay keys
# (clusterOverrides, drpc) so chart regionalDR defaults are preserved.
# Also works if merged first: -f overrides/values-cluster-names.yaml -f charts/hub/rdr/values.yaml

clusterOverrides:
  primary:
    name: ocp-primary
    version: 4.21.6
    install_config:
      metadata:
        name: ocp-primary
      compute:
        - name: worker
          replicas: 3
          platform:
            aws:
              type: m8i.4xlarge
      platform:
        aws:
          region: eu-central-1
  secondary:
    name: ocp-secondary
    version: 4.21.6
    install_config:
      metadata:
        name: ocp-secondary
      compute:
        - name: worker
          replicas: 3
          platform:
            aws:
              type: m8i.4xlarge
      platform:
        aws:
          region: eu-west-1

# DRPC overrides (preferredCluster defaults to primary if unset)
drpc:
  preferredCluster: ocp-primary
